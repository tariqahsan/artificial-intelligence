<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ollama Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #1e1e2e;
      --fg: #f0f0f5;
      --bot: #2a2a3a;
      --user: #3a7afe;
      --accent: #3a7afe;
    }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 2rem;
      height: 100vh;
      box-sizing: border-box;
    }
    h1 {
      margin-bottom: 1rem;
    }
    #chat-box {
      flex: 1;
      width: 100%;
      max-width: 750px;
      background: #262638;
      border-radius: 12px;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      box-shadow: 0 0 8px rgba(0,0,0,0.4);
    }
    .msg {
      padding: 0.6rem 0.8rem;
      border-radius: 10px;
      white-space: pre-wrap;
      line-height: 1.4;
      max-width: 90%;
    }
    .user {
      align-self: flex-end;
      background: var(--user);
      color: white;
    }
    .bot {
      align-self: flex-start;
      background: var(--bot);
    }
    #input-area {
      width: 100%;
      max-width: 750px;
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    #message {
      flex: 1;
      padding: 0.7rem;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      outline: none;
      background: #2f2f42;
      color: var(--fg);
    }
    button {
      background: var(--accent);
      border: none;
      color: white;
      padding: 0.7rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      opacity: 0.9;
    }
    .typing {
      display: inline-block;
      margin-left: 4px;
      width: 1.5em;
      text-align: left;
    }
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin: 0 2px;
      background-color: var(--fg);
      border-radius: 50%;
      opacity: 0.4;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.4; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>💬 Ollama Local Chat</h1>

  <div id="chat-box"></div>

  <div id="input-area">
    <input type="text" id="message" placeholder="Type your message..." />
    <button id="sendBtn">Send</button>
  </div>

  <script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const STORAGE_KEY = "ollama_chat_history";

    let history = loadHistory();

    // --- Initialization ---
    renderHistory();
    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessage();
    });

    // --- Functions ---
    function saveHistory() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function renderHistory() {
      chatBox.innerHTML = "";
      history.forEach(msg => addMessage(msg.role, msg.content));
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    function addTyping() {
      const div = document.createElement("div");
      div.className = "msg bot";
      div.innerHTML = `<span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = "";

      // user message
      addMessage("user", text);
      history.push({ role: "user", content: text });
      saveHistory();

      // typing animation
      const typingDiv = addTyping();

      // send to backend
      const response = await fetch("/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });

      chatBox.removeChild(typingDiv);
      const botDiv = addMessage("bot", "");
      let botReply = "";

      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        botReply += chunk;
        botDiv.textContent += chunk;
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      history.push({ role: "assistant", content: botReply });
      saveHistory();
    }
  </script>
</body>
</html>
